version: 2
updates:
  - package-ecosystem: gomod
    directory: '/'
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
